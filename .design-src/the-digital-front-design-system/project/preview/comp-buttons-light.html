<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>*{box-sizing:border-box;margin:0}html,body{background:var(--bg)}
body{font-family:var(--font-sans);color:var(--fg1);padding:26px 28px;width:700px}
.title{font-family:var(--font-mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent-2);margin-bottom:18px}
.meta{font-family:var(--font-mono);font-size:10.5px;color:var(--fg3);margin-top:16px}
.btn{font-family:var(--font-sans);font-weight:600;font-size:15px;letter-spacing:.01em;padding:13px 24px;border-radius:var(--r-2);border:1px solid transparent;cursor:pointer;transition:.18s ease}
.btn-primary{background:var(--accent);color:var(--on-accent)}
.btn-primary:hover{background:var(--blue-800)}
.btn-secondary{background:transparent;color:var(--fg1);border-color:var(--border-strong)}
.btn-secondary:hover{border-color:var(--fg1)}
.btn-ghost{background:transparent;color:var(--accent);padding-left:6px;padding-right:6px}
.btn-arrow{font-family:var(--font-mono)}
.field{font-family:var(--font-sans);font-size:15px;padding:13px 14px;border-radius:var(--r-2);border:1px solid var(--border-strong);background:var(--surface);color:var(--fg1);width:100%}
.field::placeholder{color:var(--fg3)}
.lab{font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--fg3);margin-bottom:7px;display:block}
.chip{font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;padding:6px 12px;border-radius:var(--r-pill);border:1px solid var(--border-strong);color:var(--fg2)}
.tag{font-family:var(--font-sans);font-weight:600;font-size:13px;padding:5px 11px;border-radius:var(--r-1)}
</style></head><body>
<div class="title">Buttons · Light</div>
<div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
<button class="btn btn-primary">Start a project</button>
<button class="btn btn-secondary">View work</button>
<button class="btn btn-ghost"><span class="btn-arrow">→</span> Learn more</button>
</div>
<div class="meta">Primary = deep blue fill. Hover darkens one step. Sharp 4px corners. Generous 13×24 padding.</div></body></html>
