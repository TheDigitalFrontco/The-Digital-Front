<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box;margin:0}
html,body{background:var(--bg)}
body{font-family:var(--font-sans);color:var(--fg1);padding:26px 28px;width:700px}
.row{display:flex;gap:0}
.lbl{font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;color:var(--fg3);margin-top:6px}
.cap{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.02em}
.title{font-family:var(--font-mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent-2);margin-bottom:16px}
</style></head><body>
<div class="title">Functional · Desaturated to match</div>
<div class="row" style="gap:14px">

<div style="flex:1"><div style="height:72px;background:#4F7E6B;border-radius:var(--r-2)"></div>
<div class="cap" style="margin-top:7px;color:var(--fg1);font-weight:600">Positive</div>
<div class="cap" style="color:var(--fg3)">#4F7E6B</div></div>
<div style="flex:1"><div style="height:72px;background:#B08A4A;border-radius:var(--r-2)"></div>
<div class="cap" style="margin-top:7px;color:var(--fg1);font-weight:600">Caution</div>
<div class="cap" style="color:var(--fg3)">#B08A4A</div></div>
<div style="flex:1"><div style="height:72px;background:#A85A52;border-radius:var(--r-2)"></div>
<div class="cap" style="margin-top:7px;color:var(--fg1);font-weight:600">Critical</div>
<div class="cap" style="color:var(--fg3)">#A85A52</div></div>
</div>
<div class="lbl" style="margin-top:16px">Muted, matte states — no neon. Used only for status, never decoration.</div></body></html>
