<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box;margin:0}
html,body{background:var(--bg)}
body{font-family:var(--font-sans);color:var(--fg1);padding:26px 28px;width:700px}
.row{display:flex;gap:0}
.lbl{font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;color:var(--fg3);margin-top:6px}
.cap{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.02em}
.title{font-family:var(--font-mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent-2);margin-bottom:16px}
</style></head><body>
<div class="title">Brand Blue · Matte Slate</div>
<div class="row" style="border-radius:var(--r-2);overflow:hidden">

<div style="flex:1"><div style="height:84px;background:#EEF2F8"></div>
<div class="cap" style="margin-top:7px;color:var(--fg1)">50</div>
<div class="cap" style="color:var(--fg3)">#EEF2F8</div></div>
<div style="flex:1"><div style="height:84px;background:#DCE3EF"></div>
<div class="cap" style="margin-top:7px;color:var(--fg1)">100</div>
<div class="cap" style="color:var(--fg3)">#DCE3EF</div></div>
<div style="flex:1"><div style="height:84px;background:#C2CFE2"></div>
<div class="cap" style="margin-top:7px;color:var(--fg1)">200</div>
<div class="cap" style="color:var(--fg3)">#C2CFE2</div></div>
<div style="flex:1"><div style="height:84px;background:#9FB1CD"></div>
<div class="cap" style="margin-top:7px;color:var(--fg1)">300</div>
<div class="cap" style="color:var(--fg3)">#9FB1CD</div></div>
<div style="flex:1"><div style="height:84px;background:#768FB5"></div>
<div class="cap" style="margin-top:7px;color:var(--fg1)">400</div>
<div class="cap" style="color:var(--fg3)">#768FB5</div></div>
<div style="flex:1"><div style="height:84px;background:#4F6E9B"></div>
<div class="cap" style="margin-top:7px;color:var(--fg1)">500</div>
<div class="cap" style="color:var(--fg3)">#4F6E9B</div></div>
<div style="flex:1"><div style="height:84px;background:#46618A"></div>
<div class="cap" style="margin-top:7px;color:var(--fg1)">600</div>
<div class="cap" style="color:var(--fg3)">#46618A</div></div>
<div style="flex:1"><div style="height:84px;background:#3E587F"></div>
<div class="cap" style="margin-top:7px;color:var(--fg1)">700</div>
<div class="cap" style="color:var(--fg3)">#3E587F</div></div>
<div style="flex:1"><div style="height:84px;background:#344A6A"></div>
<div class="cap" style="margin-top:7px;color:var(--fg1)">800</div>
<div class="cap" style="color:var(--fg3)">#344A6A</div></div>
<div style="flex:1"><div style="height:84px;background:#2A3C56"></div>
<div class="cap" style="margin-top:7px;color:var(--fg1)">900</div>
<div class="cap" style="color:var(--fg3)">#2A3C56</div></div>
<div style="flex:1"><div style="height:84px;background:#1E2C40"></div>
<div class="cap" style="margin-top:7px;color:var(--fg1)">950</div>
<div class="cap" style="color:var(--fg3)">#1E2C40</div></div>
</div>
<div style="display:flex;gap:18px;margin-top:18px">
<div class="lbl">Anchor · 500 #4F6E9B — light brand surface</div>
<div class="lbl">Anchor · 700 #3E587F — primary / deep</div>
</div></body></html>
