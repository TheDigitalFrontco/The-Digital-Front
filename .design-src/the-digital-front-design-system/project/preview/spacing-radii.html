<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box;margin:0}
html,body{background:var(--bg)}
body{font-family:var(--font-sans);color:var(--fg1);padding:26px 28px;width:700px}
.row{display:flex;gap:0}
.lbl{font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;color:var(--fg3);margin-top:6px}
.cap{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.02em}
.title{font-family:var(--font-mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent-2);margin-bottom:16px}
</style></head><body>
<div class="title">Radii · Sharp, geometric</div>
<div class="row" style="gap:18px">

<div style="text-align:center"><div style="width:96px;height:72px;background:var(--blue-700);border-radius:0px"></div>
<div class="cap" style="margin-top:8px;color:var(--fg1);font-weight:600">--r-0</div>
<div class="cap" style="color:var(--fg3)">0px</div></div>
<div style="text-align:center"><div style="width:96px;height:72px;background:var(--blue-700);border-radius:2px"></div>
<div class="cap" style="margin-top:8px;color:var(--fg1);font-weight:600">--r-1</div>
<div class="cap" style="color:var(--fg3)">2px</div></div>
<div style="text-align:center"><div style="width:96px;height:72px;background:var(--blue-700);border-radius:4px"></div>
<div class="cap" style="margin-top:8px;color:var(--fg1);font-weight:600">--r-2</div>
<div class="cap" style="color:var(--fg3)">4px</div></div>
<div style="text-align:center"><div style="width:96px;height:72px;background:var(--blue-700);border-radius:8px"></div>
<div class="cap" style="margin-top:8px;color:var(--fg1);font-weight:600">--r-3</div>
<div class="cap" style="color:var(--fg3)">8px</div></div>
<div style="text-align:center"><div style="width:96px;height:72px;background:var(--blue-700);border-radius:999px"></div>
<div class="cap" style="margin-top:8px;color:var(--fg1);font-weight:600">--r-pill</div>
<div class="cap" style="color:var(--fg3)">pill</div></div>
</div>
<div class="lbl" style="margin-top:16px">Default surfaces are hard-edged (r-0/r-2). Pills reserved for tags + small toggles.</div></body></html>
