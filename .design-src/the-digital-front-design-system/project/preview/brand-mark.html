<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>*{box-sizing:border-box;margin:0}html,body{background:var(--bg)}
body{font-family:var(--font-sans);color:var(--fg1);padding:26px 28px;width:700px}
.title{font-family:var(--font-mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent-2);margin-bottom:18px}
.meta{font-family:var(--font-mono);font-size:10.5px;color:var(--fg3);margin-top:16px}
.lockup{display:flex;align-items:center;gap:18px}
.mk{width:var(--mk,56px);height:var(--mk,56px);display:block}
.the{font-family:var(--font-mono);font-size:11px;letter-spacing:.34em;text-transform:uppercase;opacity:.75;margin-bottom:2px}
.wm{font-family:var(--font-display);font-weight:500;font-size:34px;letter-spacing:-.015em;line-height:.95}
</style></head><body>
<div class="title">The Mark · DF Monogram</div>
<div style="display:flex;align-items:center;gap:26px">
<div style="width:120px;height:120px;background:var(--blue-700);border-radius:var(--r-2);display:grid;place-items:center"><img src="../assets/logo-source-cropped.png" style="width:88px"></div>
<div style="width:96px;height:96px;background:var(--blue-950);border-radius:var(--r-2);display:grid;place-items:center"><img src="../assets/logo-source-cropped.png" style="width:68px"></div>
<div style="width:72px;height:72px;background:var(--blue-500);border-radius:var(--r-2);display:grid;place-items:center"><img src="../assets/logo-source-cropped.png" style="width:52px"></div>
<div style="width:48px;height:48px;background:var(--blue-700);border-radius:var(--r-1);display:grid;place-items:center"><img src="../assets/logo-source-cropped.png" style="width:36px"></div>
</div>
<div class="meta">The uploaded DF monogram — soft 3-D white render. Sits on the matte blue surfaces; holds from hero scale down to a small thumbnail.</div></body></html>
