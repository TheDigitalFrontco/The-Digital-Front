<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>*{box-sizing:border-box;margin:0}html,body{background:var(--bg)}
body{font-family:var(--font-sans);color:var(--fg1);padding:26px 28px;width:700px}
.title{font-family:var(--font-mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent-2);margin-bottom:18px}
.meta{font-family:var(--font-mono);font-size:10.5px;color:var(--fg3);margin-top:16px}
.lockup{display:flex;align-items:center;gap:18px;margin-bottom:22px}
.mk{width:var(--mk,56px);height:auto;display:block}
.the{font-family:var(--font-mono);font-size:11px;letter-spacing:.34em;text-transform:uppercase;opacity:.75;margin-bottom:2px}
.wm{font-family:var(--font-display);font-weight:500;font-size:34px;letter-spacing:-.015em;line-height:.95;white-space:nowrap}
</style></head><body>
<div class="title">Lockup · Light</div>
<div class="lockup" style="color:var(--blue-700)">
<div style="width:74px;height:74px;background:var(--blue-700);border-radius:var(--r-2);display:grid;place-items:center;flex-shrink:0"><img src="../assets/logo-source-cropped.png" alt="DF mark" style="width:54px"></div>
<div><div class="the">The</div><div class="wm">Digital Front</div></div>
</div>
<div class="meta">On light grounds the uploaded (white) mark sits in a blue tile; the wordmark carries the blue. Clear space ≈ the stem width.</div></body></html>
