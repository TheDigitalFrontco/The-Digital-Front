<!doctype html><html data-theme="dark" lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box;margin:0}
html,body{background:var(--bg)}
body{font-family:var(--font-sans);color:var(--fg1);padding:26px 28px;width:700px}
.row{display:flex;gap:0}
.lbl{font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;color:var(--fg3);margin-top:6px}
.cap{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.02em}
.title{font-family:var(--font-mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent-2);margin-bottom:16px}
</style></head><body>
<div class="title">Semantic · Dark + Brand — the signature look</div>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px">

<div><div style="height:64px;background:#1E2C40;border:1px solid rgba(255,255,255,.16);border-radius:var(--r-2)"></div>
<div class="cap" style="margin-top:7px;color:#fff;font-weight:600">bg</div>
<div class="cap" style="color:var(--fg3)">Background</div></div>
<div><div style="height:64px;background:#2A3C56;border:1px solid rgba(255,255,255,.16);border-radius:var(--r-2)"></div>
<div class="cap" style="margin-top:7px;color:#fff;font-weight:600">surface</div>
<div class="cap" style="color:var(--fg3)">Surface</div></div>
<div><div style="height:64px;background:#FFFFFF;border:1px solid rgba(255,255,255,.16);border-radius:var(--r-2)"></div>
<div class="cap" style="margin-top:7px;color:#fff;font-weight:600">fg1</div>
<div class="cap" style="color:var(--fg3)">White text</div></div>
<div><div style="height:64px;background:#C2CFE2;border:1px solid rgba(255,255,255,.16);border-radius:var(--r-2)"></div>
<div class="cap" style="margin-top:7px;color:#fff;font-weight:600">fg2</div>
<div class="cap" style="color:var(--fg3)">Secondary</div></div>
<div><div style="height:64px;background:#3E587F;border:1px solid rgba(255,255,255,.16);border-radius:var(--r-2)"></div>
<div class="cap" style="margin-top:7px;color:#fff;font-weight:600">brand bg</div>
<div class="cap" style="color:var(--fg3)">Brand surface</div></div>
<div><div style="height:64px;background:#FFFFFF;border:1px solid rgba(255,255,255,.16);border-radius:var(--r-2)"></div>
<div class="cap" style="margin-top:7px;color:#fff;font-weight:600">accent</div>
<div class="cap" style="color:var(--fg3)">Accent</div></div>
<div><div style="height:64px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.16);border-radius:var(--r-2)"></div>
<div class="cap" style="margin-top:7px;color:#fff;font-weight:600">border</div>
<div class="cap" style="color:var(--fg3)">Border</div></div>
<div><div style="height:64px;background:#9FB1CD;border:1px solid rgba(255,255,255,.16);border-radius:var(--r-2)"></div>
<div class="cap" style="margin-top:7px;color:#fff;font-weight:600">accent-2</div>
<div class="cap" style="color:var(--fg3)">Accent 2</div></div>
</div>
<div class="lbl" style="margin-top:16px;color:var(--fg2)">White logo + white type on slate blue. Matte — never glossy.</div></body></html>
