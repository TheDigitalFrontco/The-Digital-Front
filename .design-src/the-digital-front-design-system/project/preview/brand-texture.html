<!doctype html><html data-theme="dark" lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>*{box-sizing:border-box;margin:0}html,body{background:var(--bg)}
body{font-family:var(--font-sans);color:var(--fg1);padding:26px 28px;width:700px}
.title{font-family:var(--font-mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent-2);margin-bottom:18px}
.meta{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.02em;color:var(--fg3)}</style></head><body>
<div class="title" style="color:var(--accent-2)">Digital Texture · used with restraint</div>
<div style="display:flex;gap:18px">
<div style="flex:1;height:150px;border:1px solid var(--border);border-radius:var(--r-2);background-image:linear-gradient(var(--texture) 1px,transparent 1px),linear-gradient(90deg,var(--texture) 1px,transparent 1px);background-size:26px 26px"></div>
<div style="flex:1;height:150px;border:1px solid var(--border);border-radius:var(--r-2);background-image:radial-gradient(var(--texture) 1.4px,transparent 1.4px);background-size:18px 18px"></div>
</div>
<div class="meta" style="margin-top:14px;color:var(--fg3)">Grid lines (left) and pixel dots (right) at low contrast. Structure, never noise.</div></body></html>
