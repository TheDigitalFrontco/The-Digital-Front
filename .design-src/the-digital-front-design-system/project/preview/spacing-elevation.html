<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box;margin:0}
html,body{background:var(--bg)}
body{font-family:var(--font-sans);color:var(--fg1);padding:26px 28px;width:700px}
.row{display:flex;gap:0}
.lbl{font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;color:var(--fg3);margin-top:6px}
.cap{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.02em}
.title{font-family:var(--font-mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent-2);margin-bottom:16px}
</style></head><body>
<div class="title">Elevation · Soft &amp; low (matte)</div>
<div class="row" style="gap:22px;padding:8px 0 20px">

<div style="text-align:center"><div style="width:150px;height:80px;background:#fff;border-radius:var(--r-2);box-shadow:0 1px 2px rgba(30,44,64,.06),0 1px 1px rgba(30,44,64,.04)"></div>
<div class="cap" style="margin-top:14px;color:var(--fg1);font-weight:600">--shadow-1</div>
<div class="cap" style="color:var(--fg3)">Resting</div></div>
<div style="text-align:center"><div style="width:150px;height:80px;background:#fff;border-radius:var(--r-2);box-shadow:0 4px 14px rgba(30,44,64,.08)"></div>
<div class="cap" style="margin-top:14px;color:var(--fg1);font-weight:600">--shadow-2</div>
<div class="cap" style="color:var(--fg3)">Raised</div></div>
<div style="text-align:center"><div style="width:150px;height:80px;background:#fff;border-radius:var(--r-2);box-shadow:0 18px 48px rgba(30,44,64,.12)"></div>
<div class="cap" style="margin-top:14px;color:var(--fg1);font-weight:600">--shadow-3</div>
<div class="cap" style="color:var(--fg3)">Overlay</div></div>
</div></body></html>
