<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box;margin:0}
html,body{background:var(--bg)}
body{font-family:var(--font-sans);color:var(--fg1);padding:26px 28px;width:700px}
.row{display:flex;gap:0}
.lbl{font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;color:var(--fg3);margin-top:6px}
.cap{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.02em}
.title{font-family:var(--font-mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent-2);margin-bottom:16px}
</style></head><body>
<div class="title">Spacing · 4px base grid</div>
<div style="display:flex;flex-direction:column;gap:9px">

<div style="display:flex;align-items:center;gap:14px">
<div class="cap" style="width:64px;color:var(--fg3)">--s-1 · 4</div>
<div style="height:14px;width:4px;background:var(--blue-500);border-radius:1px"></div></div>
<div style="display:flex;align-items:center;gap:14px">
<div class="cap" style="width:64px;color:var(--fg3)">--s-2 · 8</div>
<div style="height:14px;width:8px;background:var(--blue-500);border-radius:1px"></div></div>
<div style="display:flex;align-items:center;gap:14px">
<div class="cap" style="width:64px;color:var(--fg3)">--s-3 · 12</div>
<div style="height:14px;width:12px;background:var(--blue-500);border-radius:1px"></div></div>
<div style="display:flex;align-items:center;gap:14px">
<div class="cap" style="width:64px;color:var(--fg3)">--s-4 · 16</div>
<div style="height:14px;width:16px;background:var(--blue-500);border-radius:1px"></div></div>
<div style="display:flex;align-items:center;gap:14px">
<div class="cap" style="width:64px;color:var(--fg3)">--s-5 · 24</div>
<div style="height:14px;width:24px;background:var(--blue-500);border-radius:1px"></div></div>
<div style="display:flex;align-items:center;gap:14px">
<div class="cap" style="width:64px;color:var(--fg3)">--s-6 · 32</div>
<div style="height:14px;width:32px;background:var(--blue-500);border-radius:1px"></div></div>
<div style="display:flex;align-items:center;gap:14px">
<div class="cap" style="width:64px;color:var(--fg3)">--s-7 · 48</div>
<div style="height:14px;width:48px;background:var(--blue-500);border-radius:1px"></div></div>
<div style="display:flex;align-items:center;gap:14px">
<div class="cap" style="width:64px;color:var(--fg3)">--s-8 · 64</div>
<div style="height:14px;width:64px;background:var(--blue-500);border-radius:1px"></div></div>
</div></body></html>
