<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box;margin:0}
html,body{background:var(--bg)}
body{font-family:var(--font-sans);color:var(--fg1);padding:26px 28px;width:700px}
.row{display:flex;gap:0}
.lbl{font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;color:var(--fg3);margin-top:6px}
.cap{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.02em}
.title{font-family:var(--font-mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent-2);margin-bottom:16px}
</style></head><body>
<div class="title">Neutrals · Snow + Cool Grey</div>
<div class="row" style="border:1px solid var(--grey-200);border-radius:var(--r-2);overflow:hidden">

<div style="flex:1"><div style="height:84px;background:#FFFFFF;box-shadow:inset 0 0 0 1px var(--grey-200)"></div>
<div class="cap" style="margin-top:7px;color:var(--fg1)">Snow</div>
<div class="cap" style="color:var(--fg3)">#FFFFFF</div></div>
<div style="flex:1"><div style="height:84px;background:#F7F8FA;"></div>
<div class="cap" style="margin-top:7px;color:var(--fg1)">50</div>
<div class="cap" style="color:var(--fg3)">#F7F8FA</div></div>
<div style="flex:1"><div style="height:84px;background:#EFF1F4;"></div>
<div class="cap" style="margin-top:7px;color:var(--fg1)">100</div>
<div class="cap" style="color:var(--fg3)">#EFF1F4</div></div>
<div style="flex:1"><div style="height:84px;background:#E2E6EC;"></div>
<div class="cap" style="margin-top:7px;color:var(--fg1)">200</div>
<div class="cap" style="color:var(--fg3)">#E2E6EC</div></div>
<div style="flex:1"><div style="height:84px;background:#CBD1DA;"></div>
<div class="cap" style="margin-top:7px;color:var(--fg1)">300</div>
<div class="cap" style="color:var(--fg3)">#CBD1DA</div></div>
<div style="flex:1"><div style="height:84px;background:#A4ACB9;"></div>
<div class="cap" style="margin-top:7px;color:var(--fg1)">400</div>
<div class="cap" style="color:var(--fg3)">#A4ACB9</div></div>
<div style="flex:1"><div style="height:84px;background:#79828F;"></div>
<div class="cap" style="margin-top:7px;color:var(--fg1)">500</div>
<div class="cap" style="color:var(--fg3)">#79828F</div></div>
<div style="flex:1"><div style="height:84px;background:#5A626E;"></div>
<div class="cap" style="margin-top:7px;color:var(--fg1)">600</div>
<div class="cap" style="color:var(--fg3)">#5A626E</div></div>
<div style="flex:1"><div style="height:84px;background:#3F4651;"></div>
<div class="cap" style="margin-top:7px;color:var(--fg1)">700</div>
<div class="cap" style="color:var(--fg3)">#3F4651</div></div>
<div style="flex:1"><div style="height:84px;background:#2A2F38;"></div>
<div class="cap" style="margin-top:7px;color:var(--fg1)">800</div>
<div class="cap" style="color:var(--fg3)">#2A2F38</div></div>
<div style="flex:1"><div style="height:84px;background:#161B22;"></div>
<div class="cap" style="margin-top:7px;color:var(--fg1)">Ink</div>
<div class="cap" style="color:var(--fg3)">#161B22</div></div>
</div>
<div class="lbl" style="margin-top:16px">Cool-tinted greys harmonise with the slate blue. White is breathing room — used generously.</div></body></html>
